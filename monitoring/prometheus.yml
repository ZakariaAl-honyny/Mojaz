global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'mojaz-backend'
    static_configs:
      - targets: ['mojaz-backend-prod:5000']
    metrics_path: '/metrics'

  - job_name: 'mojaz-db'
    static_configs:
      - targets: ['mojaz-db-prod:1433']
    # Note: SQL Server exporter would be needed for real DB metrics, using simple ping for now
