version: '3.8'

services:
  mojaz-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mojaz-db-prod
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    volumes:
      - mojaz-db-data:/var/opt/mssql
    networks:
      - mojaz-prod-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mojaz-backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: mojaz-backend-prod
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=mojaz-db;Database=MojazDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
      - Jwt__Key=${JWT_KEY}
      - Firebase__ProjectId=${FIREBASE_PROJECT_ID}
      - SendGridSettings__ApiKey=${SENDGRID_API_KEY}
    depends_on:
      mojaz-db:
        condition: service_healthy
    volumes:
      - mojaz-backend-logs:/app/logs
      - mojaz-backend-uploads:/app/uploads
    networks:
      - mojaz-prod-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mojaz-frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: mojaz-frontend-prod
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    depends_on:
      - mojaz-backend
    networks:
      - mojaz-prod-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  mojaz-nginx:
    image: nginx:alpine
    container_name: mojaz-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert-placeholders:/etc/nginx/certs:ro
    depends_on:
      - mojaz-frontend
      - mojaz-backend
    networks:
      - mojaz-prod-net

  prometheus:
    image: prom/prometheus:latest
    container_name: mojaz-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - mojaz-prod-net

  grafana:
    image: grafana/grafana:latest
    container_name: mojaz-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - mojaz-prod-net

networks:
  mojaz-prod-net:
    driver: bridge

volumes:
  mojaz-db-data:
  mojaz-backend-logs:
  mojaz-backend-uploads:
  prometheus-data:
  grafana-data:
